services:
  redz:
    build: .
    image: redz:local
    ports:
      - "6379:6379"
    volumes:
      - redz-data:/data
    environment:
      REDZ_HOST: "0.0.0.0"
      REDZ_PORT: "6379"
      REDZ_PERSISTENCE: "both"
      REDZ_DATA_DIR: "/data"
      REDZ_SNAPSHOT_INTERVAL: "60"
      REDZ_AOF_FSYNC: "everysec"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6379 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  redz-data:
